<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table,
        td {
            border: 1px solid black;
        }

        table {
            margin: 0.5em
        }
    </style>
</head>

<body>
    <h2>Profs</h2>
    <h3>Liste</h3>
    <table id="profList"></table>
    <h3>Ajouter</h3>
    <input type="text" id="newProfName" placeholder="Nom" />
    <input type="number" id="newProfQuantity" placeholder="Heures" />
    <input type="number" id="newProfMax" placeholder="Max" />
    <button id="addProfBtn">Ajouter</button>

    <h2>Groupes</h2>
    <h3>Liste</h3>
    <table id="groupList"></table>
    <h3>Ajouter</h3>
    <form id="groupForm">
    <input type="text" id="newGroupName" placeholder="Nom" />
    <input type="number" id="newGroupHeuresHebdo" placeholder="Heures hebdo" />
    <input type="number" id="newGroupQuantity" placeholder="Quantité" />
    <input type="checkbox" id="newGroupChair" checked /> Chair ?
    <button id="addGroupBtn" type="button">Ajouter</button>

    </form>

    <h2>Actions</h2>
    <button id="fixturesBtn">Fixtures</button>
    <button id="generateBtn">Générer</button>

    <h2>Possibilités <span id="possibilityNumber"><span></h2>
    <div id="progress" style="display: none;"></div>
    <div id="possibilities"></div>
    <script src="dist/app.js"></script>
</body>

</html>
